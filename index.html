    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            overflow-x: hidden;
            width: 100%;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 500;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(to bottom, #c8e6c9 0%, #d4edd6 50%, #e8f5e9 100%);
        }

        /* Heading typography */
        h1, h2, h3, h4, .top-bar, .weather-pill, .btn, .card h3, .nav-links a, .mobile-nav a, .admin-panel input, .admin-panel textarea {
            font-family: 'Lora', serif;
            font-weight: 600;
        }

        /* Sticky Top Bar with Complete Fade Out */
        .top-bar {
            background: rgba(45, 80, 22, 0.95);
            padding: 12px 30px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.35);
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            transition: opacity 0.6s ease, visibility 0.6s ease, transform 0.6s ease;
        }

        .top-bar.faded {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(-20px);
        }
        
        /* Hide top bar on scroll for mobile - show hero image */
        @media (max-width: 768px) {
            .top-bar {
                transition: transform 0.5s ease, opacity 0.5s ease;
            }
            
            .top-bar.mobile-hidden {
                transform: translateY(-100%);
                opacity: 0;
            }
        }

        .top-bar-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
        }

        .top-logo {
            height: 110px; /* Increased from 80px to make the circular logo larger */
            width: auto;
            filter: drop-shadow(4px 3px 6px rgba(0,0,0,0.5));
            flex-shrink: 0;
        }

        .top-title h1 {
            font-size: 2.2em;
            font-weight: 700;
            color: white;
            margin-bottom: 5px;
            white-space: nowrap;
        }

        .top-title p {
            font-size: 1.2em;
            color: rgba(255,255,255,0.9);
            white-space: nowrap;
        }

        /* Navigation Links */
        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-shrink: 0;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 1em;
            font-weight: 600;
            transition: opacity 0.3s, transform 0.2s;
            white-space: nowrap;
        }

        .nav-links a:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        /* Hamburger button - hidden on desktop */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            flex-shrink: 0;
        }

        .hamburger span {
            display: block;
            width: 26px;
            height: 3px;
            background: white;
            border-radius: 3px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .hamburger.open span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        /* Mobile dropdown nav */
        .mobile-nav {
            display: none;
            flex-direction: column;
            gap: 0;
            background: rgba(30, 60, 10, 0.98);
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            z-index: 999;
            border-top: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .mobile-nav.open {
            display: flex;
        }

        .mobile-nav a {
            color: white;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: 600;
            padding: 16px 25px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: background 0.2s;
        }

        .mobile-nav a:hover {
            background: rgba(255,255,255,0.1);
        }

        /* Main Content Container */
        .main-container {
            max-width: 1000px;
            margin: 60px auto 100px auto;
            background: rgba(255, 255, 255, 0.98);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }

        h2 { 
            font-size: 2.4em; 
            margin-bottom: 30px; 
            color: #2d5016; 
            text-align: center;
            font-weight: 600;
        }

            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .card { 
            background: linear-gradient(135deg, #f0f4ee 0%, #e8ede4 100%);
            padding: 30px; 
            border-radius: 12px; 
            text-align: center; 
            border: 2px solid #dce6d8;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        
        .card h3 {
            color: #2d5016;
            font-size: 1.6em;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .card p {
            font-size: 1.2em;
        }

            background: linear-gradient(135deg, #f4e4c1 0%, #e8d4a8 100%);
            border: 8px solid #8b6f47;
            border-radius: 12px;
            padding: 30px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .noticeboard h2 {
            color: #5d4e37;
            margin-bottom: 20px;
        }
        
        .notice-display {
            background: white;
            padding: 25px;
            border-radius: 8px;
            min-height: 150px;
            white-space: pre-wrap;
            font-size: 1.1em;
            line-height: 1.8;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .notice-empty {
            color: #8b6f47;
            font-style: italic;
            text-align: center;
            padding: 40px;
        }
        
        .admin-panel { 
            display: none; 
            background: white; 
            padding: 25px; 
            border-radius: 8px; 
            margin-top: 20px; 
            border: 2px solid #8b6f47;
        }
        
        .admin-panel.active { display: block; }
        
        .admin-panel input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1.1em;
        }

        .admin-panel textarea { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1.1em;
            min-height: 200px;
            resize: vertical;
        }
        
        .btn {
            background: #4a7c2c;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1em;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #3a6c1c;
        }
        
        .btn-secondary {
            background: #5d4e37;
            margin-top: 15px;
        }
        
        .btn-secondary:hover {
            background: #4a3d2a;
        }

        /* Weather Widget */
        .weather-container {
            background: linear-gradient(135deg, #87CEEB 0%, #4682B4 100%);
            padding: 30px;
            border-radius: 12px;
            color: white;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .weather-container h3 {
            font-size: 2em;
            margin-bottom: 20px;
            color: white;
            font-weight: 600;
        }
        
        .weather-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .weather-card {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .weather-card h4 {
            font-size: 1em;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        
        .weather-card p {
            font-size: 2em;
            font-weight: 700;
        }

        /* Map */
        .map-frame {
            width: 100%;
            height: 450px;
            border-radius: 12px;
            border: 3px solid #2d5016;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* QR Section */
        .qr-area {
            text-align: center;
            background: #f9f9f9;
            background-image: url('courts-drone-aerial.jpg');
            background-size: cover;
            background-position: center;
            padding: 40px;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }
