<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="canonical" href="https://www.fletchermoss-socialtennisclub.co.uk/" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fletcher Moss Social Tennis Club | Free Social Tennis in Didsbury, Manchester</title>
    <meta name="description" content="Free community tennis in Didsbury at Fletcher Moss Park. Social tennis sessions Monday, Thursday evenings and Saturday mornings. No membership fees, all abilities welcome. South Manchester.">
    <meta name="keywords" content="free tennis didsbury, social tennis manchester, fletcher moss tennis, community tennis south manchester, tennis didsbury, free tennis sessions, social tennis group">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Fletcher Moss Social Tennis Club - Free Social Tennis in Didsbury">
    <meta property="og:description" content="Join our friendly community tennis group in Didsbury. Free sessions, no membership fees, all abilities welcome.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="Fletcher moss Social Tennis Logo (1).png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="Fletcher moss Social Tennis Logo (1).png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;0,700;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            overflow-x: hidden;
            width: 100%;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 500;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(to bottom, #c8e6c9 0%, #d4edd6 50%, #e8f5e9 100%);
        }

        /* Heading typography */
        h1, h2, h3, h4, .top-bar, .weather-pill, .btn, .card h3, .nav-links a, .mobile-nav a, .admin-panel input, .admin-panel textarea {
            font-family: 'Lora', serif;
            font-weight: 600;
        }

        /* Sticky Top Bar with Complete Fade Out */
        .top-bar {
            background: rgba(45, 80, 22, 0.95);
            padding: 12px 30px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.35);
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            transition: opacity 0.6s ease, visibility 0.6s ease, transform 0.6s ease;
        }

        .top-bar.faded {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(-20px);
        }
        
        /* Hide top bar on scroll for mobile - show hero image */
        @media (max-width: 768px) {
            .top-bar {
                transition: transform 0.5s ease, opacity 0.5s ease;
            }
            
            .top-bar.mobile-hidden {
                transform: translateY(-100%);
                opacity: 0;
            }
        }

        .top-bar-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
        }

        /* Updated to crop out the top/bottom whitespace of the portrait logo */
        .top-logo {
            width: 110px;
            height: 110px;
            object-fit: cover;
            object-position: center;
            margin-left: -15px; /* Moves the logo slightly to the left */
            filter: drop-shadow(4px 3px 6px rgba(0,0,0,0.5));
            flex-shrink: 0;
        }

        .top-title h1 {
            font-size: 2.2em;
            font-weight: 700;
            color: white;
            margin-bottom: 5px;
            white-space: nowrap;
        }

        .top-title p {
            font-size: 1.2em;
            color: rgba(255,255,255,0.9);
            white-space: nowrap;
        }

        /* Navigation Links */
        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-shrink: 0;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 1em;
            font-weight: 600;
            transition: opacity 0.3s, transform 0.2s;
            white-space: nowrap;
        }

        .nav-links a:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        /* Hamburger button - hidden on desktop */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            flex-shrink: 0;
        }

        .hamburger span {
            display: block;
            width: 26px;
            height: 3px;
            background: white;
            border-radius: 3px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .hamburger.open span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        /* Mobile dropdown nav */
        .mobile-nav {
            display: none;
            flex-direction: column;
            gap: 0;
            background: rgba(30, 60, 10, 0.98);
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            z-index: 999;
            border-top: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .mobile-nav.open {
            display: flex;
        }

        .mobile-nav a {
            color: white;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: 600;
            padding: 16px 25px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: background 0.2s;
        }

        .mobile-nav a:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Main Content Container */
        .main-container {
            max-width: 1000px;
            margin: 60px auto 100px auto;
            background: rgba(255, 255, 255, 0.98);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }

        .section { margin-bottom: 60px; }
        h2 { 
            font-size: 2.4em; 
            margin-bottom: 30px; 
            color: #2d5016; 
            text-align: center;
            font-weight: 600;
        }

        /* Schedule */
        .schedule-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .card { 
            background: linear-gradient(135deg, #f0f4ee 0%, #e8ede4 100%);
            padding: 30px; 
            border-radius: 12px; 
            text-align: center; 
            border: 2px solid #dce6d8;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        
        .card h3 {
            color: #2d5016;
            font-size: 1.6em;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .card p {
            font-size: 1.2em;
        }

        /* Noticeboard - Single Editable Area */
        .noticeboard {
            background: linear-gradient(135deg, #f4e4c1 0%, #e8d4a8 100%);
            border: 8px solid #8b6f47;
            border-radius: 12px;
            padding: 30px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .noticeboard h2 {
            color: #5d4e37;
            margin-bottom: 20px;
        }
        
        .notice-display {
            background: white;
            padding: 25px;
            border-radius: 8px;
            min-height: 150px;
            white-space: pre-wrap;
            font-size: 1.1em;
            line-height: 1.8;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .notice-empty {
            color: #8b6f47;
            font-style: italic;
            text-align: center;
            padding: 40px;
        }
        
        .admin-panel { 
            display: none; 
            background: white; 
            padding: 25px; 
            border-radius: 8px; 
            margin-top: 20px; 
            border: 2px solid #8b6f47;
        }
        
        .admin-panel.active { display: block; }
        
        .admin-panel input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1.1em;
        }

        .admin-panel textarea { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1.1em;
            min-height: 200px;
            resize: vertical;
        }
        
        .btn {
            background: #4a7c2c;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1em;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #3a6c1c;
        }
        
        .btn-secondary {
            background: #5d4e37;
            margin-top: 15px;
        }
        
        .btn-secondary:hover {
            background: #4a3d2a;
        }

        /* Weather Widget */
        .weather-container {
            background: linear-gradient(135deg, #87CEEB 0%, #4682B4 100%);
            padding: 30px;
            border-radius: 12px;
            color: white;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .weather-container h3 {
            font-size: 2em;
            margin-bottom: 20px;
            color: white;
            font-weight: 600;
        }
        
        .weather-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .weather-card {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .weather-card h4 {
            font-size: 1em;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        
        .weather-card p {
            font-size: 2em;
            font-weight: 700;
        }

        /* Map */
        .map-frame {
            width: 100%;
            height: 450px;
            border-radius: 12px;
            border: 3px solid #2d5016;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* QR Section */
        .qr-area {
            text-align: center;
            background: #f9f9f9;
            background-image: url('courts-drone-aerial.jpg');
            background-size: cover;
            background-position: center;
            padding: 40px;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }

        .qr-area::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.88);
            border-radius: 12px;
        }

        .qr-area > * {
            position: relative;
            z-index: 1;
        }
        
        .qr-placeholder {
            width: 250px;
            height: 250px;
            margin: 20px auto;
            border: 3px dashed #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            color: #999;
            border-radius: 12px;
            font-size: 1.1em;
        }

        /* Info boxes with Sleek Shadow replacing the heavy left border */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .info-box {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            border: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.02);
        }
        
        .info-box h3 {
            color: #2d5016;
            margin-bottom: 12px;
            font-size: 1.4em;
            font-weight: 600;
        }

        .info-box p {
            font-size: 1.1em;
        }

        /* Note box with Sleek Shadow replacing the yellow border */
        .note-box {
            background: #fff3cd;
            padding: 20px;
            border-radius: 8px;
            margin: 25px 0;
            border: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.02);
        }
        
        .note-box p {
            color: #856404;
            margin: 0;
            font-size: 1.1em;
        }

        footer { 
            background: #2d5016; 
            color: white; 
            text-align: center; 
            padding: 50px 20px; 
        }

        .footer-inner {
            max-width: 900px;
            margin: 0 auto;
        }

        .footer-logos {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .footer-details {
            display: flex;
            justify-content: center;
            gap: 60px;
            flex-wrap: wrap;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .footer-col h4 {
            font-size: 1em;
            opacity: 0.7;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .footer-col p {
            opacity: 0.9;
            font-size: 1em;
            line-height: 1.8;
        }

        /* Scroll to top */
        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2d5016;
            color: white;
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            font-size: 1.3em;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s, transform 0.2s;
            z-index: 999;
        }

        .scroll-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .scroll-top:hover {
            transform: translateY(-3px);
            background: #3a6c1c;
        }

        /* Weather pill in hero */
        .weather-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 1em;
            margin-bottom: 25px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
        }

        /* Scroll Animation Styles */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .slide-in-left {
            opacity: 0;
            transform: translateX(-40px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }

        .slide-in-left.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .slide-in-right {
            opacity: 0;
            transform: translateX(40px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }

        .slide-in-right.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .stagger-1 { transition-delay: 0.1s; }
        .stagger-2 { transition-delay: 0.2s; }
        .stagger-3 { transition-delay: 0.3s; }
        .stagger-4 { transition-delay: 0.4s; }

        /* Parallax effect */
        .parallax-container {
            position: relative;
            overflow: hidden;
        }

        .parallax-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 120%;
            background-size: cover;
            background-position: center;
            will-change: transform;
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            body {
                background-attachment: scroll;
            }

            .top-bar {
                padding: 10px 15px;
            }

            .top-bar-inner {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                gap: 8px;
                text-align: left;
            }

            .top-bar-left {
                flex-direction: row;
                align-items: center;
                gap: 10px;
                min-width: 0;
                flex: 1;
            }

            /* Hide desktop nav, show hamburger */
            .nav-links {
                display: none;
            }

            .hamburger {
                display: flex;
                flex-shrink: 0;
            }

            /* Mobile logo height & width updated to crop portrait white space */
            .top-logo {
                width: 65px;
                height: 65px;
                margin-left: -5px; /* Slight left shift for mobile */
                flex-shrink: 0;
            }

            .top-title {
                min-width: 0;
                overflow: hidden;
            }

            .top-title h1 {
                font-size: 1.1em;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .top-title p {
                font-size: 0.85em;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            /* More breathing room on mobile */
            .main-container { 
                padding: 40px 20px; 
                margin: 80px 15px 80px 15px;
                /* Slightly more transparent to show background */
                background: rgba(255, 255, 255, 0.96);
            }

            h2 {
                font-size: 1.8em;
            }

            /* About section mobile */
            .about-section {
                padding: 30px 20px !important;
                margin-bottom: 30px !important;
            }

            .about-section h2 {
                font-size: 1.9em !important;
            }

            /* Info tiles stack nicely */
            .about-section > div:last-child {
                grid-template-columns: 1fr !important;
            }

            /* Add spacing between sections to show background */
            .section {
                margin-bottom: 40px !important;
            }

            /* Weather cards stack better */
            .weather-info {
                grid-template-columns: 1fr !important;
                gap: 15px !important;
            }

            /* Schedule cards */
            .schedule-grid {
                grid-template-columns: 1fr !important;
                gap: 15px !important;
            }

            /* Less padding on cards for mobile */
            .card {
                padding: 20px !important;
            }

            /* QR section */
            .qr-area {
                padding: 25px 15px !important;
            }
        }

        /* Hero button hover animations */
        .hero-btn {
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease !important;
        }

        .hero-btn:hover {
            transform: translateY(-3px) !important;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5) !important;
        }

        /* Tasteful Floating WhatsApp Widget */
        .whatsapp-float {
            position: fixed;
            bottom: 90px; /* Sits exactly 14px above the scroll-top button (which is at 30px) */
            right: 30px;
            background: #2d5016; /* Matches your club's deep green instead of neon */
            color: white;
            width: 46px; /* Symmetrical size to your scroll-top button */
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 998; /* Placed cleanly underneath scroll-top's z-index */
            transition: transform 0.2s ease, background-color 0.2s ease;
            text-decoration: none;
        }

        .whatsapp-float:hover {
            transform: translateY(-3px);
            background: #4a7c2c; /* Transitions to your sage green on hover */
        }

        .whatsapp-icon {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        /* Dynamic Spinner for fetch states */
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #4a7c2c;
            animation: spin 0.8s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Dynamic Rain Alert Banner -->
    <div id="rainAlertBanner" style="display: none; background: #c0392b; color: white; text-align: center; padding: 12px 20px; font-weight: 600; font-size: 1em; position: relative; z-index: 1100; border-bottom: 2px solid rgba(0,0,0,0.1);">
        ☔ High rain risk today in Didsbury. Check the WhatsApp group for session updates!
    </div>

    <header class="top-bar" id="topBar">
        <div class="top-bar-inner">
            <div class="top-bar-left">
                <img src="Fletcher moss Social Tennis Logo (1).png" alt="Fletcher Moss Social Tennis Club - Free Social Tennis in Didsbury Manchester" class="top-logo">
                <div class="top-title">
                    <h1>Fletcher Moss Social Tennis Club</h1>
                    <p>Didsbury Social Tennis</p>
                </div>
            </div>
            <nav class="nav-links">
                <a href="#about">About</a>
                <a href="#sessions">Sessions</a>
                <a href="#noticeboard">Noticeboard</a>
                <a href="#weather">Weather
